<style>

    --bg:#080c0f;--surface:#0d1318;--surface2:#121a21;--border:#1e2d38;

    --text:#e2e8f0;--muted:#64748b;

  }
  [data-theme="light"] {
    --bg:#f4f1eb;--surface:#ffffff;--surface2:#f0ece2;--border:#d6cfc0;

  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;transition:background 0.3s,color 0.3s;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,158,11,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}

  .wrapper{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:24px;}

  /* LOADER */
  #loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;transition:opacity 0.4s;}
  #loader.hidden{opacity:0;pointer-events:none;}
  .loader-ring{width:36px;height:36px;border:2px solid var(--border);border-top-color:var(--amber);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;}
  .loader-text{font-size:10px;letter-spacing:3px;color:var(--muted);text-transform:uppercase;text-align:center;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* HEADER */
  header{display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:18px;margin-bottom:24px;}
  .back{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:2px;text-transform:uppercase;transition:color 0.2s;margin-bottom:6px;}
  .back:hover{color:var(--amber);}
  .back svg{width:12px;height:12px;fill:none;stroke:currentColor;stroke-width:2;}
  h1{font-family:var(--display);font-size:44px;letter-spacing:3px;color:var(--amber);line-height:1;}
  .sector-sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}
  .header-right{text-align:right;}
  .btn{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:color 0.2s,border-color 0.2s;}
  .btn:hover{border-color:var(--amber);color:var(--amber);}
  .btn svg{width:11px;height:11px;fill:currentColor;}

  /* SECTOR SUMMARY BAR */
  .summary-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);padding:14px 18px;position:relative;overflow:hidden;}
  .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);opacity:0.5;}
  .summary-card.green::before{background:var(--green);}
  .summary-card.red::before{background:var(--red);}
  .sc-label{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
  .sc-value{font-size:24px;font-family:var(--display);letter-spacing:2px;}
  .sc-value.pos{color:var(--green);}
  .sc-value.neg{color:var(--red);}
  .sc-value.warn{color:var(--amber);}
  .sc-sub{font-size:10px;color:var(--muted);margin-top:3px;}

  /* STOCK CARDS */
  .stocks-grid{display:flex;flex-direction:column;gap:16px;}

  .stock-card{background:var(--surface);border:1px solid var(--border);overflow:hidden;transition:border-color 0.2s;}
  .stock-card:hover{border-color:var(--amber);}

  .stock-header{display:grid;grid-template-columns:80px 1fr auto auto auto auto;gap:16px;align-items:center;padding:18px 20px;cursor:pointer;}
  .stock-ticker{font-family:var(--display);font-size:28px;letter-spacing:2px;color:var(--amber);}
  .stock-name{font-size:11px;color:var(--text);margin-bottom:3px;}
  .stock-analyst{font-size:10px;color:var(--muted);}

  .stock-price{text-align:right;}
  .price-val{font-size:18px;font-family:var(--display);letter-spacing:1px;}
  .price-chg{font-size:10px;margin-top:2px;}

  .rec-badge{padding:5px 14px;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;min-width:80px;}
  .rec-buy{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3);}
  .rec-sell{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3);}
  .rec-hold{background:rgba(245,158,11,0.15);color:var(--amber);border:1px solid rgba(245,158,11,0.3);}
  .rec-na{background:rgba(100,116,139,0.1);color:var(--muted);border:1px solid var(--border);}

  .expand-icon{color:var(--muted);font-size:14px;transition:transform 0.3s;}
  .stock-card.expanded .expand-icon{transform:rotate(180deg);}

  /* EXPANDED DETAIL */
  .stock-detail{display:none;border-top:1px solid var(--border);padding:20px;}
  .stock-card.expanded .stock-detail{display:block;}

  .detail-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:20px;}

  .detail-section{background:var(--surface2);padding:14px 16px;border:1px solid var(--border);}
  .detail-section-title{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--amber);margin-bottom:12px;}

  .detail-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:11px;}
  .detail-row:last-child{margin-bottom:0;}
  .detail-key{color:var(--muted);}
  .detail-val{color:var(--text);text-align:right;}

  /* TARGET GAUGE */
  .target-gauge{margin-top:10px;}
  .gauge-track{height:4px;background:var(--border);position:relative;margin:6px 0;}
  .gauge-current{position:absolute;top:-4px;width:3px;height:12px;background:var(--amber);}
  .gauge-target{position:absolute;top:-4px;width:3px;height:12px;background:var(--green);}
  .gauge-labels{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);}

  /* HOLDER BARS */
  .holder-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:10px;}
  .holder-name{width:70px;color:var(--muted);}
  .holder-bar-track{flex:1;height:4px;background:var(--border);}
  .holder-bar-fill{height:100%;background:var(--amber);opacity:0.7;}
  .holder-val{width:60px;text-align:right;color:var(--text);}

  /* ANALYST CONSENSUS */
  .consensus-row{display:flex;gap:8px;margin-top:8px;}
  .consensus-item{flex:1;text-align:center;padding:8px 4px;background:var(--bg);border:1px solid var(--border);}
  .consensus-count{font-size:18px;font-family:var(--display);}

  .c-buy{color:var(--green);}
  .c-hold{color:var(--amber);}
  .c-sell{color:var(--red);}

  .loading-rec{font-size:10px;color:var(--muted);letter-spacing:1px;animation:blink 1.2s infinite;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
  .stock-card{animation:fadeUp 0.4s ease both;}

  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border);}
</style>

// ── FETCH LIVE RECOMMENDATIONS ─────────────────────────
async function fetchRec(ticker) {
  try {
    const res = await fetch(`https://financialmodelingprep.com/api/v3/analyst-stock-recommendations/${ticker}?limit=1&apikey=${FMP_KEY}`);
    const data = await res.json();
    if (data && data[0]) return data[0];
    return null;
  } catch { return null; }
}

async function fetchRating(ticker) {

// ── RENDER SUMMARY BAR ─────────────────────────────────
function renderSummary(stocks) {
  const totalValue = stocks.reduce((a,s) => a+s.marketValue, 0);
  const totalWeight = stocks.reduce((a,s) => a+s.weight, 0);
  const avgBeta = (stocks.reduce((a,s) => a+s.beta, 0) / stocks.length).toFixed(2);
  const avgGain = (stocks.reduce((a,s) => a+s.gainLoss, 0) / stocks.length).toFixed(1);
  const gainClass = parseFloat(avgGain) >= 0 ? 'pos' : 'neg';

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-card">
      <div class="sc-label">Sector Market Value</div>
      <div class="sc-value warn">$${(totalValue/1000).toFixed(0)}K</div>
      <div class="sc-sub">${stocks.length} positions</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Portfolio Weight</div>
      <div class="sc-value warn">${totalWeight.toFixed(1)}%</div>
      <div class="sc-sub">of total SIF portfolio</div>
    </div>
    <div class="summary-card ${parseFloat(avgGain)>=0?'green':'red'}">
      <div class="sc-label">Avg Return ITD</div>
      <div class="sc-value ${gainClass}">${avgGain > 0 ? '+':''}${avgGain}%</div>
      <div class="sc-sub">since inception</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">Avg Beta</div>
      <div class="sc-value warn">${avgBeta}</div>
      <div class="sc-sub">beta-weighted risk</div>
    </div>
  `;
}

// ── RENDER STOCK CARD ──────────────────────────────────
function recClass(rec) {
  if (!rec) return 'rec-na';
  const r = rec.toLowerCase();
  if (r.includes('buy') || r.includes('overweight') || r.includes('outperform')) return 'rec-buy';
  if (r.includes('sell') || r.includes('underweight') || r.includes('underperform')) return 'rec-sell';
  return 'rec-hold';
}

function recLabel(rec) {
  if (!rec) return '—';
  const r = rec.toLowerCase();
  if (r.includes('strong buy')) return 'STRONG BUY';
  if (r.includes('buy') || r.includes('overweight') || r.includes('outperform')) return 'BUY';
  if (r.includes('sell') || r.includes('underweight') || r.includes('underperform')) return 'SELL';
  if (r.includes('hold') || r.includes('neutral') || r.includes('equal')) return 'HOLD';
  return rec.toUpperCase().slice(0,10);
}

function upside(stock) {
  if (!stock.targetPrice) return null;
  return ((stock.targetPrice - stock.currentPrice) / stock.currentPrice * 100).toFixed(1);
}

function renderStockCard(stock, index) {
  const up = upside(stock);
  const upsideColor = up === null ? 'var(--muted)' : parseFloat(up) > 0 ? 'var(--green)' : 'var(--red)';
  const gainColor = stock.gainLoss >= 0 ? 'var(--green)' : 'var(--red)';
  const holders = FELLOW_HOLDINGS[stock.ticker] || [{name: stock.analysts[0], value: stock.marketValue}];
  const maxHolding = Math.max(...holders.map(h => h.value));

  const card = document.createElement('div');
  card.className = 'stock-card';
  card.style.animationDelay = `${index * 0.05}s`;
  card.id = `card-${stock.ticker}`;

  card.innerHTML = `
    <div class="stock-header" onclick="toggleCard('${stock.ticker}')">
      <div class="stock-ticker">${stock.ticker}</div>
      <div>
        <div class="stock-name">${stock.name}</div>
        <div class="stock-analyst">Analyst: ${stock.analysts.join(', ')}</div>
      </div>
      <div class="stock-price">
        <div class="price-val">$${stock.currentPrice.toLocaleString()}</div>
        <div class="price-chg" style="color:${gainColor}">${stock.gainLoss >= 0 ? '+' : ''}${stock.gainLoss}% ITD</div>
      </div>
      <div>
        <div style="font-size:9px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Weight</div>
        <div style="font-size:14px;font-family:var(--display);color:var(--amber)">${stock.weight}%</div>
      </div>
      <div class="rec-badge rec-na" id="rec-${stock.ticker}">LOADING</div>
      <div class="expand-icon">▼</div>
    </div>

    <div class="stock-detail">
      <div class="detail-grid">

        <div class="detail-section">
          <div class="detail-section-title">Price & Target</div>
          <div class="detail-row"><span class="detail-key">Current Price</span><span class="detail-val">$${stock.currentPrice.toLocaleString()}</span></div>
          <div class="detail-row"><span class="detail-key">Cost Basis</span><span class="detail-val">$${stock.unitCost.toFixed(2)}</span></div>
          <div class="detail-row"><span class="detail-key">Target Price</span><span class="detail-val" style="color:var(--green)">${stock.targetPrice ? '$'+stock.targetPrice.toLocaleString() : '—'}</span></div>
          <div class="detail-row"><span class="detail-key">Upside / Downside</span><span class="detail-val" style="color:${upsideColor}">${up !== null ? (parseFloat(up)>0?'+':'')+up+'%' : '—'}</span></div>
          ${stock.targetPrice ? `
          <div class="target-gauge">
            <div class="gauge-track">
              <div class="gauge-current" style="left:${Math.min(Math.max((stock.currentPrice/(stock.targetPrice*1.2))*100,2),98)}%"></div>
              <div class="gauge-target" style="left:${Math.min((stock.targetPrice/(stock.targetPrice*1.2))*100,98)}%"></div>
            </div>
            <div class="gauge-labels"><span>$0</span><span style="color:var(--amber)">Now</span><span style="color:var(--green)">Target</span></div>
          </div>` : ''}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Position Info</div>
          <div class="detail-row"><span class="detail-key">Shares</span><span class="detail-val">${stock.qty.toLocaleString()}</span></div>
          <div class="detail-row"><span class="detail-key">Market Value</span><span class="detail-val">$${stock.marketValue.toLocaleString()}</span></div>
          <div class="detail-row"><span class="detail-key">Portfolio Weight</span><span class="detail-val">${stock.weight}%</span></div>
          <div class="detail-row"><span class="detail-key">Beta</span><span class="detail-val">${stock.beta}</span></div>
          <div class="detail-row"><span class="detail-key">Gain / Loss ITD</span><span class="detail-val" style="color:${gainColor}">${stock.gainLoss >= 0 ? '+' : ''}${stock.gainLoss}%</span></div>
          <div class="detail-section-title" style="margin-top:14px">Fellow Holdings</div>
          ${holders.map(h => `
            <div class="holder-row">
              <div class="holder-name">${h.name}</div>
              <div class="holder-bar-track"><div class="holder-bar-fill" style="width:${(h.value/maxHolding*100).toFixed(0)}%"></div></div>
              <div class="holder-val">$${(h.value/1000).toFixed(1)}K</div>
            </div>`).join('')}
        </div>

        <div class="detail-section">
          <div class="detail-section-title">Analyst Consensus</div>
          <div id="consensus-${stock.ticker}">
            <div class="loading-rec">Fetching live data...</div>
          </div>
        </div>

      </div>
    </div>
  `;

  return card;
}

function toggleCard(ticker) {
  const card = document.getElementById(`card-${ticker}`);
  card.classList.toggle('expanded');
}

// ── LOAD RECOMMENDATIONS ───────────────────────────────
async function loadRec(stock) {
  const [rec, rating] = await Promise.all([fetchRec(stock.ticker), fetchRating(stock.ticker)]);

  // Update badge
  const badge = document.getElementById(`rec-${stock.ticker}`);
  if (badge) {
    const recommendation = rec?.analystRatingsStrongBuy !== undefined
      ? getBestRec(rec)
      : rating?.ratingRecommendation || null;
    badge.className = `rec-badge ${recClass(recommendation)}`;
    badge.textContent = recLabel(recommendation);
  }

  // Update consensus section
  const consensusEl = document.getElementById(`consensus-${stock.ticker}`);
  if (consensusEl) {
    if (rec && (rec.analystRatingsStrongBuy !== undefined)) {
      const strongBuy = rec.analystRatingsStrongBuy || 0;
      const buy = rec.analystRatingsBuy || 0;
      const hold = rec.analystRatingsHold || 0;
      const sell = rec.analystRatingsSell || 0;
      const strongSell = rec.analystRatingsStrongSell || 0;
      const total = strongBuy + buy + hold + sell + strongSell;

      consensusEl.innerHTML = `
        <div class="consensus-row">
          <div class="consensus-item"><div class="consensus-count c-buy">${strongBuy}</div><div class="consensus-label">Strong Buy</div></div>
          <div class="consensus-item"><div class="consensus-count c-buy">${buy}</div><div class="consensus-label">Buy</div></div>
          <div class="consensus-item"><div class="consensus-count c-hold">${hold}</div><div class="consensus-label">Hold</div></div>
          <div class="consensus-item"><div class="consensus-count c-sell">${sell}</div><div class="consensus-label">Sell</div></div>
          <div class="consensus-item"><div class="consensus-count c-sell">${strongSell}</div><div class="consensus-label">Str. Sell</div></div>
        </div>
        <div style="margin-top:12px">
          ${rating ? `
          <div class="detail-row"><span class="detail-key">FMP Rating</span><span class="detail-val" style="color:var(--amber)">${rating.rating || '—'}</span></div>
          <div class="detail-row"><span class="detail-key">Rating Score</span><span class="detail-val">${rating.ratingScore || '—'} / 5</span></div>
          <div class="detail-row"><span class="detail-key">Recommendation</span><span class="detail-val">${rating.ratingRecommendation || '—'}</span></div>
          ` : '<div style="font-size:10px;color:var(--muted)">Rating data unavailable</div>'}
          <div class="detail-row" style="margin-top:8px"><span class="detail-key">Total Analysts</span><span class="detail-val">${total}</span></div>
          <div class="detail-row"><span class="detail-key">As of</span><span class="detail-val" style="font-size:9px">${rec.date || '—'}</span></div>
        </div>
      `;
    } else if (rating) {
      consensusEl.innerHTML = `
        <div class="detail-row"><span class="detail-key">FMP Rating</span><span class="detail-val" style="color:var(--amber)">${rating.rating || '—'}</span></div>
        <div class="detail-row"><span class="detail-key">Score</span><span class="detail-val">${rating.ratingScore || '—'} / 5</span></div>
        <div class="detail-row"><span class="detail-key">Recommendation</span><span class="detail-val">${rating.ratingRecommendation || '—'}</span></div>
      `;
    } else {
      consensusEl.innerHTML = `<div style="font-size:10px;color:var(--muted)">No analyst data available for ${stock.ticker}</div>`;
    }
  }
}

function getBestRec(rec) {
  const sb = rec.analystRatingsStrongBuy || 0;
  const b  = rec.analystRatingsBuy || 0;
  const h  = rec.analystRatingsHold || 0;
  const s  = rec.analystRatingsSell || 0;
  const ss = rec.analystRatingsStrongSell || 0;
  const max = Math.max(sb+b, h, s+ss);
  if (max === sb+b) return 'buy';
  if (max === s+ss) return 'sell';
  return 'hold';
}

// ── BOOT ───────────────────────────────────────────────
async function boot() {
  document.getElementById('sector-title').textContent = sector.toUpperCase();
  document.getElementById('sector-sub').textContent = `${stocks.length} positions · SIF Equity Portfolio`;
  document.title = `SIF — ${sector}`;

  renderSummary(stocks);

  const grid = document.getElementById('stocks-grid');
  stocks.forEach((stock, i) => {
    grid.appendChild(renderStockCard(stock, i));
  });

  document.getElementById('loader').classList.add('hidden');
  const app = document.getElementById('app');
  app.style.transition = 'opacity 0.4s';
  app.style.opacity = '1';

  // Load recommendations in background
  document.getElementById('loader-text').textContent = 'Fetching Live Data';
  stocks.forEach(stock => loadRec(stock));
}

boot();
</script>
</body>
</html>
