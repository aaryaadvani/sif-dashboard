<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SIF Dashboard — Upload Report</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080c0f;--surface:#0d1318;--surface2:#121a21;--border:#1e2d38;--amber:#f59e0b;--green:#10b981;--red:#ef4444;--text:#e2e8f0;--muted:#64748b;--mono:'IBM Plex Mono',monospace;--display:'Bebas Neue',sans-serif;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,158,11,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(245,158,11,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;}

  .card{background:var(--surface);border:1px solid var(--border);padding:40px;width:100%;max-width:480px;position:relative;z-index:1;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--amber);opacity:0.5;}

  h1{font-family:var(--display);font-size:36px;letter-spacing:3px;color:var(--amber);margin-bottom:4px;}
  .sub{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}

  .field{margin-bottom:20px;}
  label{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}

  input[type="password"], input[type="text"]{
    width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);
    font-family:var(--mono);font-size:12px;padding:10px 14px;outline:none;
    transition:border-color 0.2s;
  }
  input:focus{border-color:var(--amber);}

  .drop-zone{
    border:1px dashed var(--border);padding:32px;text-align:center;
    cursor:pointer;transition:border-color 0.2s,background 0.2s;
    position:relative;
  }
  .drop-zone:hover,.drop-zone.drag{border-color:var(--amber);background:rgba(245,158,11,0.03);}
  .drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
  .drop-icon{font-size:28px;margin-bottom:10px;}
  .drop-label{font-size:11px;color:var(--muted);letter-spacing:1px;}
  .drop-name{font-size:11px;color:var(--amber);margin-top:8px;display:none;}

  .btn-upload{
    width:100%;background:var(--amber);color:#000;border:none;
    font-family:var(--display);font-size:18px;letter-spacing:3px;
    padding:14px;cursor:pointer;margin-top:24px;
    transition:opacity 0.2s;
  }
  .btn-upload:hover{opacity:0.85;}
  .btn-upload:disabled{opacity:0.4;cursor:not-allowed;}

  .back{display:inline-flex;align-items:center;gap:6px;font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:1px;margin-bottom:24px;transition:color 0.2s;}
  .back:hover{color:var(--amber);}

  .status{margin-top:20px;padding:12px 16px;border:1px solid var(--border);font-size:11px;display:none;line-height:1.6;}
  .status.ok{border-color:var(--green);color:var(--green);}
  .status.err{border-color:var(--red);color:var(--red);}
  .status.loading{border-color:var(--amber);color:var(--amber);}

  .progress{height:2px;background:var(--border);margin-top:12px;display:none;}
  .progress-fill{height:100%;background:var(--amber);width:0%;transition:width 0.3s;}
</style>
</head>
<body>
<div class="card">
  <a class="back" href="/">← Back to Dashboard</a>
  <h1>UPLOAD REPORT</h1>
  <p class="sub">Weekly PDF → Auto-updates dashboard</p>

  <div class="field">
    <label>Upload Key</label>
    <input type="password" id="uploadKey" placeholder="Enter your secret key" autocomplete="off">
  </div>

  <div class="field">
    <label>SIF Performance Report (PDF)</label>
    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept=".pdf" onchange="onFileSelect(this)">
      <div class="drop-icon">📄</div>
      <div class="drop-label">Drop PDF here or click to browse</div>
      <div class="drop-name" id="fileName"></div>
    </div>
  </div>

  <div class="progress" id="progress"><div class="progress-fill" id="progressFill"></div></div>

  <button class="btn-upload" id="uploadBtn" onclick="doUpload()" disabled>UPLOAD & REFRESH DASHBOARD</button>

  <div class="status" id="status"></div>
</div>

<script>
  let selectedFile = null;

  function onFileSelect(input) {
    selectedFile = input.files[0];
    if (selectedFile) {
      document.getElementById('fileName').style.display = 'block';
      document.getElementById('fileName').textContent = '✓ ' + selectedFile.name;
      checkReady();
    }
  }

  document.getElementById('uploadKey').addEventListener('input', checkReady);

  function checkReady() {
    const hasKey = document.getElementById('uploadKey').value.trim().length > 0;
    document.getElementById('uploadBtn').disabled = !(hasKey && selectedFile);
  }

  // Drag and drop
  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') {
      selectedFile = f;
      document.getElementById('fileName').style.display = 'block';
      document.getElementById('fileName').textContent = '✓ ' + f.name;
      checkReady();
    }
  });

  async function doUpload() {
    const key = document.getElementById('uploadKey').value.trim();
    if (!key || !selectedFile) return;

    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const progress = document.getElementById('progress');
    const fill = document.getElementById('progressFill');

    btn.disabled = true;
    btn.textContent = 'UPLOADING...';
    progress.style.display = 'block';
    status.style.display = 'none';

    // Animate progress bar
    let pct = 0;
    const ticker = setInterval(() => { pct = Math.min(pct + 8, 85); fill.style.width = pct + '%'; }, 200);

    try {
      const fd = new FormData();
      fd.append('pdf', selectedFile);

      const res = await fetch('/api/upload', {
        method: 'POST',
        headers: { 'x-upload-key': key },
        body: fd,
      });

      clearInterval(ticker);
      fill.style.width = '100%';

      const json = await res.json();

      if (res.ok) {
        status.className = 'status ok';
        status.style.display = 'block';
        status.innerHTML = `✓ Dashboard updated successfully<br>AUM: ${json.preview?.aum ? '$'+json.preview.aum.toLocaleString() : '—'}<br>Return: ${json.preview?.cumReturn || '—'}<br>Parsed at: ${new Date(json.parsedAt).toLocaleString()}`;
        btn.textContent = '✓ UPLOADED';
        setTimeout(() => window.location.href = '/', 2500);
      } else {
        throw new Error(json.error || 'Upload failed');
      }
    } catch(err) {
      clearInterval(ticker);
      fill.style.width = '0%';
      progress.style.display = 'none';
      status.className = 'status err';
      status.style.display = 'block';
      status.textContent = '✗ ' + err.message;
      btn.disabled = false;
      btn.textContent = 'UPLOAD & REFRESH DASHBOARD';
    }
  }
</script>
</body>
</html>
